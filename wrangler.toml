name = "adamic-blog-search"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
# account_id is loaded from CLOUDFLARE_ACCOUNT_ID environment variable

# Enable workers.dev subdomain
workers_dev = false

# AI binding
[ai]
binding = "AI"

[[ai_search_namespaces]]
binding = "WIKI_SEARCH"
namespace = "adamic-blog-search"
[vars]
# Comma-separated list of allowed origins for CORS
# Use "*" to allow all origins (not recommended for production)
# Example: "https://adamic.tech,https://docs.adamic.tech"
ALLOWED_ORIGINS = "https://adamic.tech"
TURNSTILE_SITE_KEY = "0x4AAAAAADmjyYZe1SbQUi1P_bgYiM-ijGA"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 10 }

[[routes]]
pattern = "search.adamic.tech/*"
zone_name = "adamic.tech"

[[routes]]
pattern = "adamic.tech/wiki-search/*"
zone_name = "adamic.tech"

# Workers Logs configuration
[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true
