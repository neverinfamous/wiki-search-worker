name = "sqlite-wiki-search"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
# account_id is loaded from CLOUDFLARE_ACCOUNT_ID environment variable

# Enable workers.dev subdomain
workers_dev = false

# AI binding
# NOTE: Using legacy [ai] binding instead of standalone [[ai_search_namespaces]]
# because current GitHub Actions / Cloudflare integration API tokens lack
# explicit 'AI Search' namespace permissions required for the standalone binding.
[ai]
binding = "AI"
[vars]
# Comma-separated list of allowed origins for CORS
# Use "*" to allow all origins (not recommended for production)
# Example: "https://adamic.tech,https://docs.adamic.tech"
ALLOWED_ORIGINS = "*"

# Production configuration
[env.production]
vars = { ALLOWED_ORIGINS = "https://adamic.tech" }

# Custom domain routes
routes = [
  { pattern = "search.adamic.tech/*", zone_name = "adamic.tech" },
  { pattern = "adamic.tech/wiki-search/*", zone_name = "adamic.tech" }
]

# Workers Logs configuration
[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true
