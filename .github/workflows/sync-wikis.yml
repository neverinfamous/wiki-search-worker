name: Sync Wiki Indexes

on:
    push:
        branches:
            - main
        paths:
            - 'wikis.json'
            - 'scripts/sync-wikis.mjs'
            - '.github/workflows/sync-wikis.yml'
    schedule:
        - cron: '0 0 * * 0' # Once a week on Sunday
    workflow_dispatch: # Manual trigger

jobs:
    setup:
        runs-on: ubuntu-24.04
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v7
            - id: set-matrix
              run: echo "matrix=$(jq -c . wikis.json)" >> $GITHUB_OUTPUT

    sync:
        needs: setup
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        strategy:
            matrix:
                wiki: ${{ fromJson(needs.setup.outputs.matrix) }}
            fail-fast: false

        name: Sync ${{ matrix.wiki.id }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
              with:
                  node-version: '22'

            - name: Clone wiki
              run: |
                  cd ..
                  git clone https://github.com/neverinfamous/${{ matrix.wiki.repo }} ${{ matrix.wiki.dir }}

            - name: Validate wiki content
              run: |
                  cd ../${{ matrix.wiki.dir }}
                  if grep -rlE '<script|<iframe|javascript:' *.md 2>/dev/null; then
                      echo "Suspicious content detected"
                      exit 1
                  fi

            - name: Upload to R2
              run: node scripts/sync-wikis.mjs ${{ matrix.wiki.id }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
