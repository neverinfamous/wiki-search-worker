name: Sync Wiki Indexes

on:
    schedule:
        - cron: '0 */6 * * *' # Every 6 hours
    workflow_dispatch: # Manual trigger

jobs:
    sync:
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        strategy:
            matrix:
                wiki:
                    - { repo: 'sqlite-mcp-server.wiki.git', id: 'sqlite', dir: 'db-mcp.wiki' }
                    - { repo: 'postgres-mcp.wiki.git', id: 'postgres', dir: 'postgres-mcp.wiki' }
                    - { repo: 'memory-journal-mcp.wiki.git', id: 'memory-journal', dir: 'memory-journal-mcp.wiki' }
                    - { repo: 'R2-Manager-Worker.wiki.git', id: 'r2-manager', dir: 'R2-Manager-Worker.wiki' }
                    - { repo: 'kv-manager.wiki.git', id: 'kv-manager', dir: 'kv-manager.wiki' }
                    - { repo: 'mysql-mcp.wiki.git', id: 'mysql-mcp', dir: 'mysql-mcp.wiki' }
                    - { repo: 'd1-manager.wiki.git', id: 'd1-manager', dir: 'd1-manager.wiki' }
                    - { repo: 'do-manager.wiki.git', id: 'do-manager', dir: 'do-manager.wiki' }
            fail-fast: false

        name: Sync ${{ matrix.wiki.id }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Setup Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
              with:
                  node-version: '22'

            - name: Clone wiki
              run: |
                  cd ..
                  git clone https://github.com/neverinfamous/${{ matrix.wiki.repo }} ${{ matrix.wiki.dir }}

            - name: Validate wiki content
              run: |
                  cd ../${{ matrix.wiki.dir }}
                  if grep -rlE '<script|<iframe|javascript:' *.md 2>/dev/null; then
                      echo "Suspicious content detected"
                      exit 1
                  fi

            - name: Upload to R2
              run: node scripts/sync-wikis.mjs ${{ matrix.wiki.id }}
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
